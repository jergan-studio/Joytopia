<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Joytopia</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <h1>🎮 Joytopia</h1>
</header>

<main>

  <!-- PLAYER PREVIEW -->
  <section class="card">
    <h2>Your Avatar</h2>

    <div class="avatar-container">
      <div class="player" id="player">
        
        <div class="head"></div>

        <div class="body">
          <div class="arm left"></div>
          <div class="torso"></div>
          <div class="arm right"></div>
        </div>

        <div class="legs">
          <div class="leg left"></div>
          <div class="leg right"></div>
        </div>

      </div>
    </div>

    <div class="controls">
      <button onclick="walk()">Walk</button>
      <button onclick="stop()">Stop</button>
      <button onclick="randomColor()">Random Outfit</button>
    </div>
  </section>

  <!-- GAMES SECTION -->
  <section class="card">
    <h2>Games</h2>

    <div class="games">
      <div class="game">
        <div class="thumbnail"></div>
        <p>Obby World</p>
      </div>

      <div class="game">
        <div class="thumbnail"></div>
        <p>Speed Run</p>
      </div>

      <div class="game">
        <div class="thumbnail"></div>
        <p>Joy Battle</p>
      </div>
    </div>
  </section>

</main>

<script src="script.js"></script>
</body>
</html>
